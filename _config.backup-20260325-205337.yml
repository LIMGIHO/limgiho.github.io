about_content: |
  복잡한 운영을 시스템으로 단순화하고 실수를 줄이는 일을 해 온 소프트웨어 엔지니어입니다. 국제종합물류와 제조 환경에서 15종 이상의 레거시 시스템과 Oracle, MySQL, PostgreSQL 등 복수의 DBMS를 웹 기반 단일 플랫폼으로 통합했고, SAP, 관세청 API, 스크래핑 및 RPA, AD/LDAP, gRPC/WCF/TCP Socket 연동까지 직접 설계하고 구축했습니다.

  수작업 10분을 5초로 단축하는 자동화, 월 1,200시간 절감, 1,000만 건 데이터 마이그레이션 자동화와 정합성 검증, GitLab CI/CD, Docker Swarm, Portainer 기반 운영 표준화까지 경험했습니다. 운영 난도를 낮추고 팀이 재현 가능하게 일할 수 있는 구조를 만드는 데 강점이 있습니다.


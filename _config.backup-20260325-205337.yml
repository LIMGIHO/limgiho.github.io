  - title: 문제 해결 방식
    layout: text
    content: |
      **문제**

      사내 15종의 시스템과 Oracle, MySQL, PostgreSQL 등 다양한 DBMS가 각각 독립적으로 운영되며 기술 스택 복잡도, 라이선스 비용, 데이터 중복, 관리 비효율이 누적되어 있었습니다. 글로벌 시스템 입력 업무도 수작업 중심이라 반복 병목과 휴먼 에러의 원인이 되고 있었습니다.

      **접근**

      기능과 데이터 흐름을 먼저 분석한 뒤 프론트엔드는 Next.js, 백엔드는 Node.js 기반으로 재설계하고, DB는 PostgreSQL로 통합했습니다. Turborepo 기반 모노레포 구조로 API, 배치, 프론트, 공통 모듈을 통합 관리해 개발 생산성과 일관성을 확보했습니다.

      공식 API가 없는 외부 시스템은 브라우저 개발자 도구로 내부 호출 방식을 분석하고, 요청 정보 URL, 헤더, 페이로드를 DB로 관리하는 기반을 만들었습니다. 이를 바탕으로 RPA 방식 자동화 시스템을 구축했습니다.

      **보완**

      Next.js API Route만으로는 외부 시스템 연동 시 안정성과 확장성 한계가 있어 독립적인 백엔드를 추가했습니다. 팩토리 메서드 패턴을 적용해 다양한 DBMS 연동을 지원했고, AD/LDAP 계정 연동, DB Pool 도입, 프로시저 변경 이력 관리, Zustand 기반 상태관리, 배치 스레드 관리 구조까지 함께 정비했습니다.

      **결과**

      복잡했던 사내 IT 환경을 웹 기반 단일 플랫폼으로 통합했고, 소수 인원으로도 안정적으로 운영할 수 있는 구조를 만들었습니다. Oracle 라이선스 비용을 줄이고 수작업 오류를 낮췄으며, 이후 더 큰 규모의 운영 환경에도 적용 가능한 경험을 쌓았습니다.


about_content: |
  <p class="hero-kicker">파편화된 운영을 연결하고 자동화해 하나의 플랫폼으로 만들어왔습니다.</p>

  Node.js, TypeScript, C#, .NET 기반으로 레거시 통합, 데이터 처리, 업무 자동화, DB 마이그레이션, 배포 표준화를 수행했습니다. 파편화된 시스템을 운영 가능한 하나의 플랫폼으로 통합하고, 반복 업무를 자동화하며, 데이터 정합성과 운영 안정성을 높이는 데 강점이 있습니다. 최근에는 Codex, Claude Code 같은 AI 코딩 도구를 활용해 구현과 탐색 속도를 높이면서도, 테스트와 구조화 기준을 통해 코드 품질을 유지하는 방식을 고민하고 있습니다.

  <p class="hero-metrics">수작업 10분 -> 5초 · 월 1,200시간 절감 · 테스트 게이트 도입 · 배포 표준화</p>

content:
  - title: 대표 프로젝트
    layout: list
    content:
      - layout: left
        border: weak
        title: 웹기반 통합 운영 플랫폼 구축
        link: https://velog.io/@lasid84/웹통합-최적화
        link_text: Velog
        sub_title: KWE Korea
        caption: 2023.09 - 2025.05
        quote: Next.js, Node.js, Turborepo, PostgreSQL, Worker Threads
        description: |
          **역할**  
          통합 아키텍처 설계부터 공통 모듈, 배치 구조, 외부 시스템 연동, 운영 구조 정비까지 주도했습니다.

          **문제**  
          파편화된 운영 시스템과 복수의 DBMS로 인해 중복 업무, 데이터 불일치, 유지보수 복잡도가 누적되어 있었습니다.

          **주요 수행 내용**
          - 시스템과 데이터 흐름을 분석해 통합 아키텍처를 설계했습니다.
          - Turborepo 기반으로 API, 배치, 프론트, 공통 모듈을 일원화했습니다.
          - 웹기반으로 업그레이드된 글로벌 시스템의 API를 분석해 연동을 재개발했습니다.
          - AD/LDAP 연동, 다중 DBMS 대응, 워커 스레드 배치, 스크래핑 자동화를 구현했습니다.

          **결과**  
          4개 시스템 통합, 수작업 10분 -> 5초 단축, 라이선스 비용 절감, 소수 인원으로도 안정적인 전사 시스템 운영 기반 확보.

      - layout: left
        border: weak
        title: Backend 운영 표준화
        sub_title: KWE Korea
        caption: 2025.06 - 2025.12
        quote: NestJS, GitLab CI/CD, Docker Swarm, Portainer, TDD
        description: |
          **역할**  
          Express 기반 서비스와 PM2 중심 수동 배포 환경을 재정비해 오래 운영 가능한 구조로 전환했습니다.

          **문제**  
          기존 Express 기반 서비스는 기능 확장 시 일관된 코드 구조 유지가 어렵고 테스트 코드 도입이 제한적이었습니다. PM2 중심의 수동 배포 환경은 서버 상태와 환경 차이로 재현성이 낮고, 배포 이력 및 롤백 표준이 부족했습니다.

          **주요 수행 내용**
          - Express 서비스를 NestJS 기반으로 리팩토링하고, DDD 관점으로 도메인별 구조를 나눈 뒤 각 도메인에 클린 아키텍처 계층을 적용했습니다.
          - 인증, 로깅 등 공통 기능을 구조화하고 재사용 가능한 형태로 정리했습니다.
          - TDD 기반 단위 및 통합 테스트를 도입했습니다.
          - GitLab CI 기반 테스트 게이트를 적용하고, 동일 이미지 재배포와 배포 이력 추적이 가능한 배포 체계를 정비했습니다.
          - 서비스와 태스크 상태, 로그를 확인할 수 있는 운영 가시성을 확보했습니다.

          **결과**  
          테스트 미통과 변경 자동 차단, 배포 재현성과 변경 이력 추적 확보, 운영 신뢰성과 유지보수 효율 향상.

      - layout: left
        border: weak
        title: 글로벌 시스템 데이터 입력 자동화
        sub_title: KWE Korea
        caption: 2024.08 - 2024.12
        quote: C#, WinForms, OCR, SQLite
        description: |
          **역할**  
          설치형 글로벌 시스템의 반복 입력 작업을 줄이기 위한 자동화 프로그램 개발을 담당했습니다.

          **문제**  
          글로벌 시스템의 데이터 입력 작업에 과도한 시간이 소요되어 업무팀의 야근이 빈번하게 발생하고 있었습니다.

          **주요 수행 내용**
          - C# 기반 매크로 프로그램을 개발했습니다.
          - 글로벌 시스템 화면의 글자와 위치 정보를 캡처하고, SQLite에 좌표를 저장하는 방식을 적용했습니다.
          - 저장된 좌표와 OCR 인식을 바탕으로 일부 데이터 입력 흐름을 자동화했습니다.

          **결과**  
          월 1,200시간 절감, 입력 누락과 오입력 가능성 감소.

      - layout: left
        title: 세금계산서 프로그램 리뉴얼 및 DB 전환
        sub_title: KWE Korea
        caption: 2023.01 - 2023.07
        quote: C# (.NET 6), gRPC, PostgreSQL, PL/pgSQL
        description: |
          **역할**  
          Oracle Forms 기반 회계 프로그램의 재구축과 DB 전환 전략 수립, 데이터 이전 자동화를 주도했습니다.

          **문제**  
          단순 화면 교체보다 대용량 데이터 이전과 정합성 보장이 핵심이었고, Oracle 의존으로 인한 비용과 운영 리스크도 컸습니다.

          **주요 수행 내용**
          - Oracle에서 PostgreSQL로의 전환 전략을 수립했습니다.
          - 1,000만 건 데이터 마이그레이션을 자동화하고 정합성을 검증했습니다.
          - gRPC 기반 연동 구조를 설계했습니다.
          - 스마트빌 연동으로 국세청 즉시 신고와 매입 데이터의 실시간 처리를 구현했습니다.

          **결과**  
          유지보수성과 확장성 강화, 라이선스 비용 절감, 대규모 데이터 이전 자동화.


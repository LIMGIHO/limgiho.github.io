about_content: |
  <p class="hero-kicker">"어떻게 하면 휴먼 에러를 없애고 시스템으로 자동화할 수 있을까?"를 치열하게 고민하고 구현하는 엔지니어입니다.</p>

  Node.js, TypeScript, C#, .NET 기반의 소프트웨어 엔지니어입니다.
  물류·제조 환경에서 시스템 통합, 업무 자동화, 데이터 처리, DB 전환, 배포 표준화를 수행해 왔습니다.
  파편화된 운영 시스템을 하나의 플랫폼으로 통합하고, 반복 업무를 자동화하며,
  데이터 정합성과 운영 안정성을 높이는 데 강점이 있습니다.

  <p class="hero-metrics">15종 레거시 시스템 통합 · 수작업 10분 → 5초 · 월 1,200시간 절감 · 1,000만 건 데이터 마이그레이션 자동화</p>

content:
  - title: Experience
    layout: list
    content:
      - layout: left
        border: weak
        title: KWE Korea
        link: https://www.kwe.com/
        link_text: www.kwe.com
        sub_title: 전략개발부 차장 (Lead Software Engineer)
        caption: 2022.01 ~ 현재
        quote: 국제 종합 물류 기업
        description: |
          - 물류 운영 시스템의 **풀스택 개발·운영**, **시스템 통합·자동화**, DB 전환, 배포 표준화를 수행했습니다. (사내 시스템 개발 및 운영 리드)
          - 15종의 파편화된 레거시 시스템을 분석해 **5개 단위의 통합 플랫폼**(항공/해운 수출입 및 재무)으로 전환했습니다.
          - 관세청 API 연동 및 **삼성 NERP RPA 봇**을 구축해 부서의 반복 수작업을 근본적으로 제거했습니다.
          - **Oracle → PostgreSQL** 1,000만 건 마이그레이션, **NestJS 리팩토링**, **GitLab CI/CD 파이프라인**을 구축했습니다.

      - layout: left
        title: ILJIN Global
        link: https://www.iljin.com/
        link_text: www.iljin.com
        sub_title: 생산관리시스템(MES) 개발팀 과장 (Software Engineer)
        caption: 2010.12 ~ 2022.01
        quote: 베어링 제조 기업
        description: |
          - 공장 운영 시스템 리뉴얼 및 **생산 데이터 기반(MES/ERP)**운영 시스템 개발을 수행했습니다.
          - 노후화된 VB6 기반 MES를 **C#·.NET으로 전면 재구축**하고 **SAP 실시간 연계**를 구현했습니다.
          - 제천 및 슬로바키아 글로벌 공장 **MES 고도화 업그레이드 프로젝트**를 리드했습니다.
          - 일 **100만 건 이상의 실시간 데이터**를 분석해 이상 징후를 즉각 조치하는 **SPC 알림 시스템**을 개발했습니다.
          - 2017년 **과장 특진** 및 2021년 **최우수사원 표창**을 수상했습니다.

  - title: 핵심 강점
    layout: list
    content:
      - layout: left
        border: weak
        title: Legacy Modernization
        description: |
          C#, VB6, Oracle Forms 등 오래된 기반 기술로 만들어진 레거시 시스템을 **Nest.js, Next.js, PostgreSQL 중심의 모던 아키텍처**로 무중단 전환하여 안정성과 성능은 확보하고 유지보수성은 끌어올린 경험이 풍부합니다.

      - layout: left
        border: weak
        title: Automation & Integration
        description: |
          **SAP, 관세청 API 연계부터 웹 스크래핑, RPA, AD/LDAP, gRPC, TCP Socket**까지. 공식/비공식 연동 및 프로토콜 경험에 구애받지 않고, 업무 흐름을 한곳으로 단순화하여 비즈니스 속도를 높입니다.

      - layout: left
        border: weak
        title: Data & DB
        description: |
          **Oracle, MySQL, PostgreSQL 설계와 최적화** 역량을 보유하고 있으며, 특히 이기종 마이그레이션 상황에서 **1,000만 건의 대규모 데이터 무중단 이관 및 정합성 교차 검증** 스크립트를 직접 주도했습니다.

      - layout: left
        title: Reliability & Operations
        description: |
          어플리케이션 영역(**NestJS 기반 아키텍처 전환, TDD 체계**)부터 인프라 영역(**GitLab CI/CD 파이프라인, Docker Swarm, Portainer**)까지 포괄하여, 개발자 개인에 의존하지 않는 '검증, 추적, 롤백' 중심의 운영 문화를 도입합니다.

  - title: 주요 프로젝트
    layout: list
    content:
      - layout: left
        border: weak
        title: Docker Swarm 기반 CI/CD 표준 배포 체계 구축
        sub_title: KWE Korea
        caption: 2025.11 - 2025.12
        quote: GitLab CI/CD, Docker, Docker Swarm, Portainer
        description: |
          **배경**  
          PM2를 이용한 수작업 배포는 테스트 누락 위험이 높고, 서버 환경 불일치로 재현성이 떨어지며 체계적인 롤백이 어려웠습니다.

          **성과**
          - 유닛 테스트 미통과 시 배포 파이프라인을 자동 차단하는 Test Gate 도입
          - Kaniko 기반의 브랜치-SHA 컨테이너 이미지 관리를 통해 롤백의 안전성과 배포 이력 추적 역량 확보
          - Portainer를 통해 다수 컨테이너의 상태 로그와 리소스를 실시간 모니터링하는 통합 환경 완성

      - layout: left
        border: weak
        title: Backend 서비스 리팩토링 (Express -> NestJS)
        sub_title: KWE Korea
        caption: 2025.06 - 2025.10
        quote: Node.js, NestJS, PostgreSQL, Prisma, Redis, BullMQ
        description: |
          **배경**  
          Express 기반의 과거 서비스는 자유도가 높은 반면, 비즈니스/컨트롤러 경계가 혼재되어 테스트 작성이 매우 어려웠습니다.

          **성과**
          - 비즈니스 로직을 도메인 주도의 모듈(DI) 아키텍처로 세분화하여 신규 기능에 대한 확장성 증진
          - **Redis와 BullMQ를 도입**해 무거운 작업을 비동기 배치 파이프라인으로 분리하고, 인증 데이터 캐싱으로 DB 부하를 절감하여 자원 효율성 극대화
          - TDD 기반의 단위/통합 테스트를 도입하여 기능 추가·수정 시 즉각적인 영향 범위 파악으로 릴리스 신뢰성 극대화

      - layout: left
        border: weak
        title: Web 기반 사내 시스템 전면 통합
        sub_title: KWE Korea
        caption: 2023.09 - 2025.05
        quote: Express, Next.js, Turborepo, PostgreSQL, PM2
        description: |
          **배경**  
          15종 이상의 파편화된 사내 프로그램과 3개의 이기종 DBMS가 혼용되어 유지보수 한계와 업무 혼선이 임계점에 달했습니다.

          **성과**
          - 분절된 레거시 시스템(C#, Oracle Forms, 구 VB 등)을 5개 핵심 비즈니스 도메인 위주의 단일 Web 플랫폼으로 통합 개편 주도
          - Turborepo 기반 Monorepo 전략을 도입하여 API·UI·공통 모듈의 의존성을 일원화하고 사내 개발 생산성 혁신
          - 관세청 및 화물 사이트 스크래핑 모듈로 통관/위치 정보를 자동화시켜, 1건당 수작업 10분 소요되던 과정을 5초 이내로 단축

      - layout: left
        border: weak
        title: 삼성 NERP 업무 자동화
        sub_title: KWE Korea
        caption: 2024.08 - 2024.12
        quote: C# (.NET 4.5), WinForms, OCR, MySQL
        description: |
          **배경**  
          수작업에 크게 의존하는 삼성 시스템(NERP) 데이터 전송/입력으로 인해 잦은 인적 에러와 심각한 야근 발생.

          **성과**
          - 자체 문서 검증 프로세스를 거듭 탑재한 RPA/자동 연동 봇(Bot) 설계 및 구축
          - 실무 부서의 데이터 처리량을 감당할 수준의 무인화로 **월 기준 1,200시간 상당의 막대한 수작업 절감**

      - layout: left
        border: weak
        title: 세금계산서 시스템 .NET 및 PostgreSQL 리뉴얼
        sub_title: KWE Korea
        caption: 2023.01 - 2023.07
        quote: C# (.NET 6), gRPC, PostgreSQL, PL/pgSQL
        description: |
          **배경**  
          기존 Oracle Forms 기반 시스템 기술지원 한계 극복 및 라이선스 비용 절감 필요.

          **성과**
          - .NET 6 최신 백엔드로 인프라를 재구축하고, Oracle 에서 PostgreSQL 오픈소스 데이터베이스로 완전 이관
          - 누적 1,000만 건 데이터에 대해 마이그레이션 스크립트 작성 및 양측 DB 간의 무결성 교차 검증 자동화
          - 외부 스마트빌(SmartBill) 연동을 통한 국세청 즉시 신고 및 실시간 매입/매출 데이터 연동 환경 구현

      - layout: left
        border: weak
        title: 사내 MES - SAP 실시간 연동 인터페이스 개발
        sub_title: ILJIN Global
        caption: 2019.01 - 2019.12
        quote: C# (.NET 4.5), ASP.NET, WinForms, WCF, Oracle, PL/SQL
        description: |
          **성과**
          - 기존 수작업 또는 단방향 배치 전송이던 것을 탈피해, 실시간 ERP(SAP) ↔ MES 양방향 재고 및 생산이동 연동
          - BOM, Routing 등 핵심 생산 기준정보의 자동 마이그레이션 인터페이스 개발

      - layout: left
        border: weak
        title: 제천·슬로바키아 공장 MES 고도화
        sub_title: ILJIN Global
        caption: 2016.04 - 2017.12
        quote: VB6 -> C#, WCF, Oracle PL/SQL
        description: |
          **성과**
          - 노후화된 VB6 클라이언트 환경을 C#/.NET WCF 기반 서비스로 최신화하여 관리 효율 증대
          - 제조 현장에 제품 단위 바코드 기반 LOT 추적(Traceability) 망을 깔아 데이터 정밀도와 고객사 클레임 방어력 향상

      - layout: left
        title: SPC 이상현상 알림 시스템 개발
        sub_title: ILJIN Global
        caption: 2015.09
        quote: VB6, Oracle PL/SQL
        description: |
          **성과**
          - 공정 설비와의 TCP Socket 통신 모듈을 설계·구현했습니다.
          - 일 평균 100만 건 이상 인입되는 생산 계측 데이터를 실시간 분석해 7가지 품질 파라미터 기준의 이상 징후를 감지하고 SMS 알림을 구현했습니다.


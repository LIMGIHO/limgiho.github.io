about_content: |
  <p class="hero-kicker">복잡한 운영을 실수 줄이는 시스템으로 바꾸는 일을 해왔습니다.</p>

  Node.js, TypeScript, C#, .NET 기반의 소프트웨어 엔지니어입니다.
  물류·제조 환경에서 시스템 통합, 업무 자동화, 데이터 처리, DB 전환, 배포 표준화를 수행해 왔습니다.
  파편화된 운영 시스템을 하나의 플랫폼으로 통합하고, 반복 업무를 자동화하며,
  데이터 정합성과 운영 안정성을 높이는 데 강점이 있습니다.

  <p class="hero-metrics">4개 시스템 통합 · 수작업 10분 → 5초 · 월 1,200시간 절감 · 1,000만 건 데이터 마이그레이션 자동화</p>

content:
  - title: Experience
    layout: list
    content:
      - layout: left
        border: weak
        title: KWE Korea
        link: https://www.kwe.com/
        link_text: www.kwe.com
        sub_title: 전략개발부 과장
        caption: 2022.01 ~ 현재
        quote: 국제 종합 물류 기업
        description: |
          - 물류 운영 시스템의 백엔드 개발·운영, 시스템 통합·자동화, DB 전환, 배포 표준화를 수행했습니다.
          - 15종의 레거시 시스템과 3종의 DBMS를 분석해 4개 핵심 시스템을 통합 운영 플랫폼으로 전환했습니다.
          - 관세청 API·스크래핑 자동화와 삼성 NERP 연동 RPA를 구축해 반복 업무를 줄였습니다.
          - Oracle → PostgreSQL 전환, 1,000만 건 데이터 마이그레이션 자동화, Express → NestJS 리팩토링, GitLab CI/CD · Docker Swarm 기반 운영 표준화를 진행했습니다.

      - layout: left
        title: ILJIN Global
        link: https://www.iljin.com/
        link_text: www.iljin.com
        sub_title: MES 개발팀 과장
        caption: 2010.12 ~ 2022.01
        quote: 베어링 제조 기업
        description: |
          - MES/ERP 연동, 공장 운영 시스템 리뉴얼, 생산 데이터 기반 운영 시스템 개발을 수행했습니다.
          - VB6/Oracle 기반 MES를 C#/.NET으로 재구축하고 SAP 연동 자동화를 구현했습니다.
          - 제천·슬로바키아 공장 MES 업그레이드 프로젝트에서 개발 파트를 리드했습니다.
          - 일 100만 건 이상의 생산 데이터를 실시간 분석하는 SPC 이상현상 알림 시스템을 개발했습니다.
          - 2017년 과장 특진, 2021년 우수사원 표창을 받았습니다.


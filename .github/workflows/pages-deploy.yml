name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.6
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build default site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.yml --destination _site

      - name: Build Kurly site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.kurly.yml --baseurl /kurly --destination _site/kurly

      - name: Build 42dot site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.42dot.yml --baseurl /42dot --destination _site/42dot

      - name: Build Woowahan site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.woowahan.yml --baseurl /woowahan --destination _site/woowahan

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
